openapi: 3.0.3
info:
  title: Consensus Lab API
  description: REST API for blockchain consensus mechanism simulation
  version: 1.0.0
  contact:
    name: Consensus Lab Team
    email: support@consensuslab.com

servers:
  - url: https://localhost:5001/api/v1
    description: Development server
  - url: https://consensuslab.azurewebsites.net/api/v1
    description: Production server

paths:
  /simulations/start:
    post:
      summary: Start a new consensus simulation
      operationId: startSimulation
      tags:
        - Simulations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartSimulationRequest'
            examples:
              poet_simulation:
                summary: PoET Simulation Example  
                value:
                  protocol: "poet"
                  nodeCount: 6
                  rounds: 20
                  params:
                    waitLowMs: 50
                    waitHighMs: 300
                    seed: 7
              pbft_simulation:
                summary: PBFT Simulation Example
                value:
                  protocol: "pbft"
                  nodeCount: 7
                  rounds: 15
                  params:
                    faultyNodes: 2
                    threshold: 5
      responses:
        '202':
          description: Simulation started successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulationResponse'
        '400':
          description: Invalid simulation parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded (5 starts per minute)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /simulations/{simulationId}/analytics:
    get:
      summary: Get simulation analytics and metrics
      operationId: getSimulationAnalytics
      tags:
        - Analytics
      parameters:
        - name: simulationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Analytics data retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsSummary'
        '404':
          description: Simulation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /simulations/{simulationId}/control:
    post:
      summary: Control simulation execution (pause/resume/stop)
      operationId: controlSimulation
      tags:
        - Simulations
      parameters:
        - name: simulationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimulationControlRequest'
      responses:
        '200':
          description: Control command executed successfully
        '404':
          description: Simulation not found
        '409':
          description: Invalid state transition

  /blocks:
    get:
      summary: List blocks with pagination and filtering
      operationId: listBlocks
      tags:
        - Blocks
      parameters:
        - name: simId
          in: query
          description: Filter by simulation ID
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          description: Page number (1-based)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          description: Number of blocks per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: protocol
          in: query
          description: Filter by consensus protocol
          schema:
            type: string
            enum: [pow, pos, dpos, poa, pbft, poet, pob]
      responses:
        '200':
          description: List of blocks retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockListResponse'

  /blocks/{blockId}:
    get:
      summary: Get detailed information about a specific block
      operationId: getBlock
      tags:
        - Blocks
      parameters:
        - name: blockId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Block details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockDetail'
        '404':
          description: Block not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /experiments:
    get:
      summary: List user experiments with pagination
      operationId: listExperiments
      tags:
        - Experiments
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: status
          in: query
          description: Filter by experiment status
          schema:
            type: string
            enum: [pending, running, completed, failed, paused]
      responses:
        '200':
          description: List of experiments retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperimentListResponse'

  /experiments/{experimentId}:
    get:
      summary: Get experiment details
      operationId: getExperiment
      tags:
        - Experiments
      parameters:
        - name: experimentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Experiment details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperimentDetail'

  /settings/protocols/{protocol}:
    put:
      summary: Update protocol configuration (Admin only)
      operationId: updateProtocolSettings
      tags:
        - Settings
      security:
        - bearerAuth: []
      parameters:
        - name: protocol
          in: path
          required: true
          schema:
            type: string
            enum: [pow, pos, dpos, poa, pbft, poet, pob]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProtocolSettings'
      responses:
        '200':
          description: Protocol settings updated successfully
        '401':
          description: Unauthorized
        '403':
          description: Admin role required

components:
  schemas:
    StartSimulationRequest:
      type: object
      required:
        - protocol
        - nodeCount
        - rounds
      properties:
        protocol:
          type: string
          enum: [pow, pos, dpos, poa, pbft, poet, pob]
          description: Consensus protocol to simulate
        nodeCount:
          type: integer
          minimum: 5
          maximum: 100
          description: Number of nodes in simulation
        rounds:
          type: integer
          minimum: 1
          maximum: 100
          description: Number of consensus rounds to run
        params:
          type: object
          additionalProperties: true
          description: Protocol-specific parameters as key-value pairs

    SimulationResponse:
      type: object
      properties:
        simulationId:
          type: string
          format: uuid
        hubUrl:
          type: string
          description: SignalR hub URL for real-time updates
        status:
          type: string
          enum: [started, queued]

    SimulationControlRequest:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          enum: [pause, resume, stop]

    AnalyticsSummary:
      type: object
      properties:
        height:
          type: integer
          description: Final blockchain height
        winnerDistribution:
          type: object
          additionalProperties:
            type: integer
          description: Count of wins per node
        protocolMetrics:
          type: object
          properties:
            avgWaitMs:
              type: number
              description: Average wait time (PoET)
            quorum:
              type: integer
              description: Required quorum size (PBFT)
            forks:
              type: integer
              description: Number of orphaned blocks
            totalBurned:
              type: number
              description: Total tokens burned (PoB)
            totalStake:
              type: number
              description: Total stake in system (PoS)

    BlockListResponse:
      type: object
      properties:
        blocks:
          type: array
          items:
            $ref: '#/components/schemas/BlockSummary'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'

    BlockSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        height:
          type: integer
        hash:
          type: string
        proposer:
          type: string
          description: Proposer node display name
        protocol:
          type: string
        timestamp:
          type: string
          format: date-time

    BlockDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        height:
          type: integer
        hash:
          type: string
        prevHash:
          type: string
          nullable: true
        proposer:
          $ref: '#/components/schemas/NodeSummary'
        protocol:
          type: string
        payload:
          type: object
          nullable: true
          description: Payload data for Supply-Chain/FL modes
        metadata:
          type: object
          description: Protocol-specific metadata
        timestamp:
          type: string
          format: date-time

    NodeSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        role:
          type: string
        power:
          type: number
        stake:
          type: number

    ExperimentListResponse:
      type: object
      properties:
        experiments:
          type: array
          items:
            $ref: '#/components/schemas/ExperimentSummary'
        pagination:
          $ref: '#/components/schemas/PaginationInfo'

    ExperimentSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        protocol:
          type: string
        nodeCount:
          type: integer
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    ExperimentDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        protocol:
          type: string
        nodeCount:
          type: integer
        rounds:
          type: integer
        status:
          type: string
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        finalHeight:
          type: integer
          nullable: true
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/NodeSummary'

    ProtocolSettings:
      type: object
      additionalProperties: true
      description: Protocol-specific configuration parameters

    PaginationInfo:
      type: object
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message
        code:
          type: string
          description: Error code for client handling
        details:
          type: object
          description: Additional error details

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

tags:
  - name: Simulations
    description: Consensus simulation management
  - name: Analytics  
    description: Simulation analytics and metrics
  - name: Blocks
    description: Blockchain data access
  - name: Experiments
    description: Experiment management
  - name: Settings
    description: System configuration (Admin)