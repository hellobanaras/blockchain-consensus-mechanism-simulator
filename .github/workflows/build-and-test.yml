name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '9.0'
  BUILD_CONFIGURATION: 'Release'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: consensusdb_test
          POSTGRES_USER: consensus_user
          POSTGRES_PASSWORD: consensus_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

    - name: Run unit tests
      run: |
        dotnet test tests/Consensus.Core.Tests/Consensus.Core.Tests.csproj \
          --configuration ${{ env.BUILD_CONFIGURATION }} \
          --no-build \
          --verbosity normal \
          --logger trx \
          --collect:"XPlat Code Coverage"
      env:
        ConnectionStrings__DefaultConnection: "Host=localhost;Database=consensusdb_test;Username=consensus_user;Password=consensus_password"

    - name: Run API tests
      run: |
        dotnet test tests/Consensus.Api.Tests/Consensus.Api.Tests.csproj \
          --configuration ${{ env.BUILD_CONFIGURATION }} \
          --no-build \
          --verbosity normal \
          --logger trx \
          --collect:"XPlat Code Coverage"
      env:
        ConnectionStrings__DefaultConnection: "Host=localhost;Database=consensusdb_test;Username=consensus_user;Password=consensus_password"

    - name: Run Web tests
      run: |
        dotnet test tests/Consensus.Web.Tests/Consensus.Web.Tests.csproj \
          --configuration ${{ env.BUILD_CONFIGURATION }} \
          --no-build \
          --verbosity normal \
          --logger trx \
          --collect:"XPlat Code Coverage"
      env:
        ConnectionStrings__DefaultConnection: "Host=localhost;Database=consensusdb_test;Username=consensus_user;Password=consensus_password"

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          **/TestResults/*.trx
          **/TestResults/*/coverage.cobertura.xml

    - name: Upload code coverage
      uses: codecov/codecov-action@v4
      if: success()
      with:
        files: '**/TestResults/*/coverage.cobertura.xml'
        fail_ci_if_error: false

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: build-and-test
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: consensusdb_e2e
          POSTGRES_USER: consensus_user
          POSTGRES_PASSWORD: consensus_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

    - name: Install Playwright browsers
      run: |
        dotnet build tests/Consensus.E2E.Tests/Consensus.E2E.Tests.csproj
        pwsh tests/Consensus.E2E.Tests/bin/${{ env.BUILD_CONFIGURATION }}/net9.0/playwright.ps1 install

    - name: Run E2E tests
      run: |
        dotnet test tests/Consensus.E2E.Tests/Consensus.E2E.Tests.csproj \
          --configuration ${{ env.BUILD_CONFIGURATION }} \
          --no-build \
          --verbosity normal \
          --logger trx
      env:
        ConnectionStrings__DefaultConnection: "Host=localhost;Database=consensusdb_e2e;Username=consensus_user;Password=consensus_password"

    - name: Upload E2E test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-test-results
        path: |
          **/TestResults/*.trx
          **/playwright-report/
          **/test-results/